[domain]
main_function = initialize_grid_with_hu_mesh_with_scar
library_file = ./shared_libs/libdefault_domains.so
name = Coelho Salinet
original_discretization = 500.0
desired_discretization = 500.0
num_volumes = 19250
;mesh_file = local_meshes/daniel_moreira/coelho_sim.alg
mesh_file = meshes/teste_coelho.alg
num_extra_fields = 11
start_dx = 500.000000
start_dy = 500.000000
start_dz = 500.000000

; [domain]
; name=Plain Mesh
; num_layers=1
; start_dx=500.0
; start_dy=500.0
; start_dz=500.0
; side_length=10000
; main_function=initialize_grid_with_square_mesh

[assembly_matrix]
main_function = anisotropic_sigma_assembly_matrix_for_hu_mesh
init_function = set_initial_conditions_fvm
sigma_factor = 0.0
sigma_l = 0.000313
sigma_t = 0.000313 / 10
sigma_n = 0.000313 / 10
fibers_in_mesh = true
number_layers_bz = 0

