; sigma_z=0.000176
; library_file=shared_libs/libdefault_matrix_assembly.so
; main_function=homogeneous_sigma_assembly_matrix

[update_monodomain]
main_function = update_monodomain_default
library_file = ./shared_libs/libdefault_update_monodomain.so

[linear_system_solver]
main_function = conjugate_gradient
init_function = init_conjugate_gradient
end_function = end_conjugate_gradient
tolerance = 1e-9
use_preconditioner = no
use_gpu = no
max_iterations = 200

[extra_data]
; main_function=set_extra_data_mixed_tt3
main_function = set_extra_data_for_scv_mesh
; main_function = set_extra_data_for_scv_mesh_with_square_mesh

[save_result]
print_rate = 100
mesh_print_rate = 100
mesh_format = ensight
output_dir = ./outputs/coelho_salinet_8stim/
init_function = init_save_with_activation_times
end_function = end_save_with_activation_times
main_function = save_with_activation_times
time_threshold=0.0
activation_threshold=0.3
apd_threshold=0.2
remove_older_simulations=1
binary = true
file_prefix = V
abort_on_no_activity = false
last_stimulus_time = 5112.0
vm_threshold = 0.0


; [save_state]
; main_function = save_simulation_state_with_activation_times
; input_dir = ./outputs/coelho_salinet_plain/

