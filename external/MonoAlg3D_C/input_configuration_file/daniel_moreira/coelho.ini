[main]
num_threads = 12
dt_pde = 0.020000
simulation_time = 1000.0
abort_on_no_activity = 1
use_adaptivity = 0

[update_monodomain]
main_function = update_monodomain_default
library_file = ./shared_libs/libdefault_update_monodomain.so

[save_result]
output_dir = outputs/daniel_moreira__rabbit_only_endo_lv
print_rate = 100
binary = true
mesh_format = ensight
mesh_print_rate = 100
file_prefix = V
abort_on_no_activity = true
last_stimulus_time = 5112.0
vm_threshold = -86.0
main_function = save_as_vtu
init_function = init_save_as_vtk_or_vtu
end_function = end_save_as_vtk_or_vtu
library_file = ./shared_libs/libdefault_save_mesh.so
remove_older_simulation = true

[save_state]
main_function = save_simulation_state_with_activation_times
input_dir = ./outputs/coelho_salinet/[save_state]

[assembly_matrix]
main_function = anisotropic_sigma_assembly_matrix_for_hu_mesh
init_function = set_initial_conditions_fvm
;fast_endo_layer_scale = 1
sigma_factor = 0.0
sigma_l= 0.000174     
sigma_t= 0.000019
sigma_n= 0.000019
fibers_in_mesh = true
number_layers_bz = 0

[linear_system_solver]
main_function = conjugate_gradient
init_function = init_conjugate_gradient
end_function = end_conjugate_gradient
tolerance = 1e-9
use_preconditioner = no
use_gpu = yes
max_iterations = 200

[domain]
main_function = initialize_grid_with_hu_mesh_with_scar
library_file = ./shared_libs/libdefault_domains.so
name = Coelho
original_discretization = 500.0
desired_discretization = 500.0
num_volumes = 11771
mesh_file = local_meshes/daniel_moreira/coelho_sim.alg
num_extra_fields = 11
start_dx = 500.000000
start_dy = 500.000000
start_dz = 500.000000

[ode_solver]
dt = 0.020000
use_gpu = false
gpu_id = 0
library_file = shared_libs/libminimal_model.so

[extra_data]
main_function = set_extra_data_for_scv_mesh

[stim1_lvrv]
main_function = set_stim_from_file
library_file = ./shared_libs/libdefault_stimuli.so
start = 45
duration = 2
current = 0.5
stim_file = local_stims/daniel_moreira/rabbit_lvrv_endo_stim.pts

[stim2_lvrv]
main_function = set_stim_from_file
library_file = ./shared_libs/libdefault_stimuli.so
start = 400
duration = 2
current = 0.5
stim_file = local_stims/daniel_moreira/rabbit_lvrv_endo_stim.pts

